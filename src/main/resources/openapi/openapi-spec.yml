openapi: 3.0.0

servers:
  - description: Refdata Court Hearing Court Houses API
    url: https://api-cp-refdata-courthearing-courthouses.net/{version}
    variables:
      version:
        default: 0.0.0
        description: API version; matches the spec info.version

info:
  title: Common Platform API Refdata Court Hearing Court Houses
  description: |
    Provides information about court buildings and the rooms within them.

    Returns the building name, postal address, and room details for a given court.
    Used by listing officers and court diary systems to show where a hearing is
    taking place — for example when printing a hearing notice or populating a
    daily court list.
  version: 0.0.0
  contact:
    email: no-reply@hmcts.com
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'

tags:
  - name: Court Room
    description: Operations related to court room
  - name: Court House
    description: Operations related to court house

paths:
  /courthouses/{court_id}/courtrooms/{court_room_id}:
    get:
      description: Retrieve details of a court house by court_id and court_room_id
      operationId: getCourthouseByCourtIdAndCourtRoomId
      tags:
        - Court Room
      parameters:
        - in: path
          name: court_id
          required: true
          description: Unique identifier for the court house
          schema:
            type: string
            format: uuid
          example: "57323172-1083-454d-8ab7-2455a8b993e7"
        - in: path
          name: court_room_id
          required: true
          description: Unique identifier for the court room
          schema:
            type: string
            format: uuid
          example: "aa12f3dd-4cc1-4da7-b9ea-552fa3b9bc44"

      responses:
        '200':
          description: court details found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourtHouseResponse"
              examples:
                Court_House_With_Court_Room:
                  summary: Court Room
                  value:
                    courtHouseType: crown
                    courtHouseCode: LND001
                    courtHouseName: Central London County Court
                    address:
                      address1: Thomas More Building
                      address2: Royal Courts of Justice
                      address3: Strand
                      address4: London
                      postalCode: WC2A 2LL
                      country: UK
                    courtRoom: [ {
                      courtRoomId: 101,
                      courtRoomName: Courtroom A
                    } ]
        '400':
          description: bad input parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '401':
          description: Your JWT token failed validation

  /courthouses/{court_id}:
    get:
      description: Retrieve details of a court house by court_id
      operationId: getCourthouseByCourtId
      tags:
        - Court House
      parameters:
        - in: path
          name: court_id
          required: true
          description: Unique identifier for the court house
          schema:
            type: string
            format: uuid
          example: "57323172-1083-454d-8ab7-2455a8b993e7"

      responses:
        '200':
          description: court details found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourtHouseResponse"
              examples:
                Court_House:
                  summary: Court House
                  value:
                    courtHouseType: crown
                    courtHouseCode: LND001
                    courtHouseName: Central London County Court
                    address:
                      address1: Thomas More Building
                      address2: Royal Courts of Justice
                      address3: Strand
                      address4: London
                      postalCode: WC2A 2LL
                      country: UK
        '400':
          description: bad input parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '401':
          description: Your JWT token failed validation

components:
  schemas:
    CourtRoom:
      type: object
      properties:
        courtRoomId:
          description: Ref data id (EPIMS or OU Court id)
          type: integer
          example: 101
        courtRoomName:
          description: Name for the court room
          type: string
          example: "Courtroom A"
      additionalProperties: false

    Address:
      type: object
      properties:
        address1:
          description: Address Line 1
          type: string
          default: ''
          example: 'Thomas More Building'
        address2:
          description: Address Line 2
          type: string
          default: ''
          example: 'Royal Courts of Justice'
        address3:
          description: Address Line 3
          type: string
          default: ''
          example: 'Strand'
        address4:
          description: Address Line 4
          type: string
          default: ''
          example: 'London'
        postalCode:
          description: UK postcode
          type: string
          default: ''
          example: 'WC2A 2LL'
          pattern: "^(([gG][iI][rR] {0,}0[aA]{2})|(([aA][sS][cC][nN]|[sS][tT][hH][lL]|[tT][dD][cC][uU]|[bB][bB][nN][dD]|[bB][iI][qQ][qQ]|[fF][iI][qQ][qQ]|[pP][cC][rR][nN]|[sS][iI][qQ][qQ]|[iT][kK][cC][aA]) {0,}1[zZ]{2})|((([a-pr-uwyzA-PR-UWYZ][a-hk-yxA-HK-XY]?[0-9][0-9]?)|(([a-pr-uwyzA-PR-UWYZ][0-9][a-hjkstuwA-HJKSTUW])|([a-pr-uwyzA-PR-UWYZ][a-hk-yA-HK-Y][0-9][abehmnprv-yABEHMNPRV-Y]))) {0,}[0-9][abd-hjlnp-uw-zABD-HJLNP-UW-Z]{2}))$"
        country:
          description: United Kingdom
          type: string
          default: ''
          example: 'UK'
      additionalProperties: false

    CourtHouseResponse:
      type: object
      properties:
        courtHouseType:
          description: Specifies the type of court
          type: string
          enum:
            - crown
            - magistrate
          example: "crown"
        courtHouseCode:
          description: Links to the court that is responsible for the courtrooms
          type: string
          example: "LND001"
        courtHouseName:
          description: Name of the court house
          type: string
          example: "Central London County Court"
        address:
          $ref: '#/components/schemas/Address'
        courtRoom:
          type: array
          items:
            $ref: '#/components/schemas/CourtRoom'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
          description: Unique identifier for error tracing